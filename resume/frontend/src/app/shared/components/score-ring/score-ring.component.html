<div class="ring" [class]="(score | scoreColor) ?? 'low'">
  <svg viewBox="0 0 100 100" aria-hidden="true">
    <circle class="ring-bg" cx="50" cy="50" r="45" />
    <circle
      class="ring-fg"
      cx="50"
      cy="50"
      r="45"
      [style.stroke-dashoffset]="dashOffset"
    />
  </svg>
  <div class="ring-text">
    <strong>{{ score ?? '-' }}</strong>
    <span>{{ label }}</span>
  </div>
</div>
