<div class="page history-page">
  <header class="page-head">
    <h1>分析历史</h1>
    <p>所有分析记录持久化在 SQLite，支持回看与对比</p>
  </header>

  <p class="error" *ngIf="error">{{ error }}</p>

  <table class="table" *ngIf="records.length; else empty">
    <thead>
      <tr>
        <th>时间</th>
        <th>文件</th>
        <th>岗位</th>
        <th>匹配度</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of records">
        <td>{{ r.createdAt | date: 'yyyy-MM-dd HH:mm' }}</td>
        <td>{{ r.fileName | truncate: 24 }}</td>
        <td>{{ r.jobTitle || '—' }}</td>
        <td><span [class]="r.matchScore | scoreColor">{{ r.matchScore }}%</span></td>
        <td><a [routerLink]="['/history', r.id]">查看详情</a></td>
      </tr>
    </tbody>
  </table>

  <ng-template #empty>
    <p class="empty">暂无记录，请先在「分析」页完成一次分析。</p>
  </ng-template>
</div>
